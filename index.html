function renderDashboard(){let h=new Date().getHours(),r=ready(),a=align(),tw=today(),plan="";if(state.customProgram[tw])state.customProgram[tw].forEach(e=>{let t=state.targets[e.key]||{};plan+=`<div class="listitem"><div><b>${e.name}</b><br><span class="mini">${e.repMin}-${e.repMax} reps • ${e.muscle}</span></div><div class="badge">${kg(t.weight)} × ${t.currentRepTarget||e.repMin}</div></div>`});else plan=tw==="Run"?"<p>Run 4-5km easy.</p>":"<p>Rest day. Optional mobility only.</p>";dashboard.innerHTML=`<div class="hero"><h1>${h<12?"Good morning":"Good evening"}, Seebo 👊</h1><p>Performance Coaching System</p><p class="mini ok">Version 2.1 loaded — full navigation restored.</p><div class="grid"><div class="metric"><span>Today</span><b>${tw}</b></div><div class="metric"><span>Readiness</span><b>${r?r+"/10":"—"}</b></div><div class="metric"><span>Alignment</span><b>${a.score}/100</b></div><div class="metric"><span>Weekly Volume</span><b>${vol7().toLocaleString()}kg</b></div></div></div><div class="card"><div class="row"><h2>Today's Plan</h2><button onclick="nav('workout')">Start</button></div><label class="mini">Switch today's workout</label><select onchange="state.dayOverrides[key()]=this.value;save();renderDashboard()">${["Push A","Pull A","Run","Legs","Push B","Pull B","Rest"].map(x=>`<option ${x===tw?"selected":""}>${x}</option>`).join("")}</select><div>${plan}</div></div><div class="card"><h2>Coach Notes</h2><div class="rec">${r?r>=8?"Green light. Train normally.":r>=6?"Amber. Keep form strict and avoid grinding.":"Low readiness. Reduce intensity or remove one set.":"Complete a recovery check-in."}</div></div>`}
function renderWorkout(dateOverride=null){let names=Object.keys(state.customProgram),tw=today();workout.innerHTML=`<div class="card"><h2>Workout Logger</h2><label class="mini">Workout date</label><input id="workoutDate" type="date" value="${dateOverride||key()}"><select id="workoutSelect" onchange="renderWorkoutList()">${names.map(n=>`<option ${n===(state.customProgram[tw]?tw:names[0])?"selected":""}>${n}</option>`).join("")}</select><div class="edit-actions"><button class="secondary" onclick="renderWorkoutEditor()">Edit Workout</button><button class="secondary" onclick="showAddExerciseToWorkout()">Add Exercise</button></div><div id="workoutEditor"></div></div><div id="workoutList"></div><div id="stretchPanel"></div><div class="card"><h2>Finish Session</h2><textarea id="sessionNotes" placeholder="Notes, niggles, energy, form..."></textarea><button style="width:100%;margin-top:10px" onclick="saveWorkout()">Complete Workout</button></div>`;renderWorkoutList()}function renderWorkoutList(){let n=workoutSelect.value,l=workoutList;l.innerHTML="";state.customProgram[n].forEach(e=>{let t=state.targets[e.key]||{weight:e.weight,currentRepTarget:e.repMin},note=t.lastReason?`<div class="${recClass(t.lastAction)}"><b>Next: ${kg(t.weight)} × ${t.currentRepTarget||e.repMin}</b><div class="mini">${t.lastReason}</div></div>`:"",s=`<div class="exercise"><div class="row"><div><b>${e.name}</b><br><span class="mini">${e.repMin}-${e.repMax} reps • ${e.pattern}</span></div><div class="badge">${kg(t.weight)} × ${t.currentRepTarget||e.repMin}</div></div><div class="setgrid"><label>Set</label><label>KG</label><label>Reps</label><label>RPE</label>`;for(let i=1;i<=e.targetSets;i++)s+=`<div class="setnum">${i}</div><input id="${e.key}_w_${i}" type="number" step="0.5" value="${t.weight}"><input id="${e.key}_r_${i}" type="number" value="${t.currentRepTarget||e.repMin}"><input id="${e.key}_rpe_${i}" type="number" placeholder="8">`;s+=`</div><div class="row" style="margin-top:10px"><button class="ghost small" onclick="adjust('${e.key}',-2.5)">-2.5</button><button class="ghost small" onclick="repeatPrev('${e.key}')">Previous</button><button class="ghost small" onclick="adjust('${e.key}',2.5)">+2.5</button><button class="secondary small" onclick="startTimer(${e.rest||90},'Rest')">Timer</button></div>${note}</div>`;l.innerHTML+=s});renderStretches(n)}function renderWorkoutEditor(){let n=workoutSelect.value;workoutEditor.innerHTML=`<div class="card"><h3>Edit ${n}</h3>${state.customProgram[n].map((e,i)=>`<div class="library-card"><b>${e.name}</b><div class="inline-form"><input value="${e.name}" onchange="editWorkoutExercise('${n}',${i},'name',this.value)"><input value="${e.muscle}" onchange="editWorkoutExercise('${n}',${i},'muscle',this.value)"><input type="number" value="${e.targetSets}" onchange="editWorkoutExercise('${n}',${i},'targetSets',this.value)"><input type="number" value="${e.repMin}" onchange="editWorkoutExercise('${n}',${i},'repMin',this.value)"><input type="number" value="${e.repMax}" onchange="editWorkoutExercise('${n}',${i},'repMax',this.value)"><input type="number" value="${e.rest}" onchange="editWorkoutExercise('${n}',${i},'rest',this.value)"></div><div class="edit-actions"><button class="ghost" onclick="moveExercise('${n}',${i},-1)">Up</button><button class="ghost" onclick="moveExercise('${n}',${i},1)">Down</button><button class="danger" onclick="removeExerciseFromWorkout('${n}',${i})">Remove</button></div></div>`).join("")}</div>`}function editWorkoutExercise(w,i,f,v){let e=state.customProgram[w][i];if(["targetSets","repMin","repMax","rest"].includes(f))v=parseInt(v)||1;e[f]=v;save();renderWorkoutList();renderWorkoutEditor()}function moveExercise(w,i,d){let a=state.customProgram[w],n=i+d;if(n<0||n>=a.length)return;[a[i],a[n]]=[a[n],a[i]];save();renderWorkoutList();renderWorkoutEditor()}function removeExerciseFromWorkout(w,i){if(confirm("Remove exercise?")){state.customProgram[w].splice(i,1);save();renderWorkoutList();renderWorkoutEditor()}}function showAddExerciseToWorkout(){let w=workoutSelect.value;showModal(`<div class="row"><h2>Add Exercise</h2><button class="ghost small" onclick="closeModal()">Close</button></div>${state.exerciseLibrary.map(e=>`<div class="library-card"><div class="row"><div><b>${e.name}</b><br><span class="mini">${e.category}</span></div><button onclick="state.customProgram['${w}'].push(clone(state.exerciseLibrary.find(x=>x.key==='${e.key}')));save();closeModal();renderWorkoutList()">Add</button></div></div>`).join("")}`)}
function adjust(k,d){document.querySelectorAll(`[id^="${k}_w_"]`).forEach(i=>i.value=(+i.value+d).toFixed(1).replace(".0",""))}function previousExercise(k){for(let i=state.workoutSessions.length-1;i>=0;i--){let e=state.workoutSessions[i].exercises.find(x=>x.key===k);if(e)return e}return null}function repeatPrev(k){let p=previousExercise(k);if(!p)return alert("No previous data.");p.sets.forEach((s,i)=>{let n=i+1;if(document.getElementById(`${k}_w_${n}`)){document.getElementById(`${k}_w_${n}`).value=s.weight;document.getElementById(`${k}_r_${n}`).value=s.reps;document.getElementById(`${k}_rpe_${n}`).value=s.rpe||""}})}function renderStretches(n){stretchPanel.innerHTML=`<div class="card"><h2>Post-Workout Stretches</h2>${(ST[n]||[]).map(s=>`<div class="listitem"><div><b>${s[0]}</b><br><span class="mini">${s[1]} seconds</span></div><button class="secondary small" onclick="startTimer(${s[1]},'${s[0]}')">Timer</button></div>`).join("")}</div>`}function saveWorkout(){let n=workoutSelect.value,exercises=[],volume=0,date=workoutDate.value?new Date(workoutDate.value+"T12:00:00").toISOString():new Date().toISOString();state.customProgram[n].forEach(e=>{let sets=[],vol=0,best=0;for(let i=1;i<=e.targetSets;i++){let weight=+document.getElementById(`${e.key}_w_${i}`).value||0,reps=+document.getElementById(`${e.key}_r_${i}`).value||0,rpe=+document.getElementById(`${e.key}_rpe_${i}`).value||0;sets.push({id:uid("set"),set:i,weight,reps,rpe});vol+=weight*reps;if(weight&&reps)best=Math.max(best,epley(weight,reps))}let d=prog(e,sets);state.targets[e.key]={...(state.targets[e.key]||{}),weight:d.nextWeight,currentRepTarget:d.nextRepTarget,lastAction:d.action,lastReason:d.reason};if(["bench","squat","ohp","row"].includes(e.key)&&best>state.oneRM[e.key])state.oneRM[e.key]=round(best);exercises.push({...clone(e),id:uid("ex"),sets,volume:vol,progression:d});volume+=vol});state.workoutSessions.push({id:uid("workout"),date,name:n,notes:sessionNotes.value,readiness:ready(),volume,exercises});save();renderDashboard();alert("Workout saved.")}
function renderHistory(){history.innerHTML=`<div class="card"><h2>Workout History</h2><p>Tap any workout to view/edit sets, RPE and notes.</p></div>`+state.workoutSessions.slice().reverse().map(w=>`<div class="historyItem" onclick="openWorkout('${w.id}')"><div class="row"><div><b>${w.name}</b><br><span class="mini">${new Date(w.date).toLocaleDateString("en-GB")} • Readiness ${w.readiness||"—"}/10</span></div><b>${Math.round(w.volume).toLocaleString()}kg</b></div></div>`).join("")}function showModal(h){modal.innerHTML=`<div class="modalCard">${h}</div>`;modal.classList.remove("hide")}function closeModal(){modal.classList.add("hide");modal.innerHTML=""}function openWorkout(id){let w=state.workoutSessions.find(x=>x.id===id);if(!w)return;showModal(`<div class="row"><h2>${w.name}</h2><button class="ghost small" onclick="closeModal()">Close</button></div><textarea id="editNotes">${w.notes||""}</textarea>${w.exercises.map((e,ei)=>`<div class="exercise"><b>${e.name}</b><div class="setgrid"><label>Set</label><label>KG</label><label>Reps</label><label>RPE</label>${e.sets.map((s,si)=>`<div class="setnum">${si+1}</div><input id="e_${ei}_${si}_w" type="number" value="${s.weight}"><input id="e_${ei}_${si}_r" type="number" value="${s.reps}"><input id="e_${ei}_${si}_rpe" type="number" value="${s.rpe||""}">`).join("")}</div></div>`).join("")}<div class="edit-actions"><button onclick="saveEdits('${id}')">Save Edits</button><button class="danger" onclick="deleteWorkout('${id}')">Delete</button></div>`)}function saveEdits(id){let w=state.workoutSessions.find(x=>x.id===id);w.notes=editNotes.value;w.exercises.forEach((e,ei)=>e.sets.forEach((s,si)=>{s.weight=+document.getElementById(`e_${ei}_${si}_w`).value||0;s.reps=+document.getElementById(`e_${ei}_${si}_r`).value||0;s.rpe=+document.getElementById(`e_${ei}_${si}_rpe`).value||0}));recalc();closeModal();renderHistory();alert("Updated.")}function deleteWorkout(id){if(confirm("Delete workout?")){state.workoutSessions=state.workoutSessions.filter(w=>w.id!==id);recalc();closeModal();renderHistory()}}
function renderProgress(){progress.innerHTML=`<div class="card"><h2>Progress</h2><div class="grid"><div class="metric"><span>Sessions</span><b>${state.workoutSessions.length}</b></div><div class="metric"><span>Runs</span><b>${state.runs.length}</b></div><div class="metric"><span>Weekly Volume</span><b>${vol7().toLocaleString()}kg</b></div><div class="metric"><span>Alignment</span><b>${align().score}/100</b></div></div></div><div class="card"><h2>Volume Trend</h2><canvas id="volumeCanvas" width="600" height="190"></canvas></div><div class="card"><h2>Lift Detail</h2><select id="liftSelect" onchange="renderLiftDetail()">${state.exerciseLibrary.map(e=>`<option value="${e.key}">${e.name}</option>`).join("")}</select><div id="liftDetail"></div></div>`;drawVolume();renderLiftDetail()}function drawVolume(){let c=volumeCanvas,ctx=c.getContext("2d"),vals=state.workoutSessions.slice(-10).map(w=>w.volume);ctx.clearRect(0,0,c.width,c.height);if(!vals.length){ctx.fillStyle="#a6ada8";ctx.fillText("No workouts logged yet.",20,90);return}let max=Math.max(...vals,1),bar=c.width/vals.length;vals.forEach((v,i)=>{let h=v/max*140;ctx.fillStyle="#39d353";ctx.fillRect(i*bar+8,170-h,bar-16,h)})}function renderLiftDetail(){let k=liftSelect.value,rows=[];state.workoutSessions.forEach(w=>w.exercises.filter(e=>e.key===k).forEach(e=>rows.push({date:w.date,sets:e.sets,vol:e.volume})));liftDetail.innerHTML=rows.length?rows.slice(-8).reverse().map(r=>`<div class="listitem"><div><b>${new Date(r.date).toLocaleDateString("en-GB")}</b><br><span class="mini">${r.sets.map(s=>`${s.weight}×${s.reps}`).join(", ")}</span></div><b>${Math.round(r.vol)}kg</b></div>`).join(""):"<p>No history yet.</p>"}
function renderCalendar(){let now=new Date(),y=now.getFullYear(),m=now.getMonth(),first=new Date(y,m,1),days=new Date(y,m+1,0).getDate(),start=(first.getDay()+6)%7,cells=["M","T","W","T","F","S","S"].map(d=>`<div class="calHead">${d}</div>`).join("");for(let i=0;i<start;i++)cells+="<div></div>";for(let d=1;d<=days;d++){let k=`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`,ws=state.workoutSessions.filter(w=>w.date.slice(0,10)===k),rs=state.runs.filter(r=>r.date.slice(0,10)===k),ms=state.alignment.filter(a=>a.date.slice(0,10)===k);cells+=`<div class="calDay ${k===key()?"today":""}" onclick="openDay('${k}')"><b>${d}</b><br>${ws.length?'<span class="dot workoutDot"></span>':''}${rs.length?'<span class="dot runDot"></span>':''}${ms.length?'<span class="dot mobDot"></span>':''}</div>`}calendar.innerHTML=`<div class="card"><h2>${now.toLocaleDateString("en-GB",{month:"long",year:"numeric"})}</h2><div class="calendar">${cells}</div></div>`}function openDay(k){let ws=state.workoutSessions.filter(w=>w.date.slice(0,10)===k);showModal(`<div class="row"><h2>${new Date(k+"T12:00").toLocaleDateString("en-GB")}</h2><button class="ghost small" onclick="closeModal()">Close</button></div><button onclick="closeModal();nav('workout');setTimeout(()=>{workoutDate.value='${k}'},50)">Add Workout</button><button class="secondary" onclick="quickRun('${k}')">Add Run</button><button class="secondary" onclick="quickRecovery('${k}')">Add Recovery</button>${ws.map(w=>`<div class="historyItem" onclick="closeModal();openWorkout('${w.id}')"><b>${w.name}</b><br><span class="mini">${Math.round(w.volume).toLocaleString()}kg</span></div>`).join("")}`)}function quickRun(k){let d=prompt("Distance km?");if(!d)return;state.runs.push({date:new Date(k+"T12:00").toISOString(),distance:+d,time:prompt("Time?")||"",rpe:+(prompt("RPE?")||0)});save();closeModal();renderCalendar()}function quickRecovery(k){state.recovery.push({date:new Date(k+"T12:00").toISOString(),sleep:+(prompt("Sleep?")||7),energy:+(prompt("Energy?")||7),soreness:+(prompt("Soreness?")||3),stress:+(prompt("Stress?")||4)});save();closeModal();renderCalendar()}
function renderExercises(){exercises.innerHTML=`<div class="card"><h2>Exercise Depository</h2><input id="exerciseSearch" placeholder="Search..." oninput="renderExerciseList()"><div class="row" style="margin-top:8px"><select id="categoryFilter" onchange="renderExerciseList()"><option>All</option><option>Chest</option><option>Back</option><option>Legs</option><option>Shoulders</option><option>Arms</option><option>Core</option><option>Custom</option></select><button class="secondary" onclick="openNewExercise()">Add</button></div></div><div id="exerciseList"></div>`;renderExerciseList()}function renderExerciseList(){let q=(exerciseSearch?.value||"").toLowerCase(),cat=categoryFilter?.value||"All";exerciseList.innerHTML=state.exerciseLibrary.filter(e=>(cat==="All"||e.category===cat)&&e.name.toLowerCase().includes(q)).map(e=>`<div class="library-card"><div class="row"><div><b>${e.name}</b><br><span class="mini">${e.category} • ${e.repMin}-${e.repMax}</span></div><button class="ghost small" onclick="toggleFav('${e.key}')">${e.fav?"★":"☆"}</button></div><div class="edit-actions"><button class="secondary" onclick="editLibraryExercise('${e.key}')">Edit</button><button class="danger" onclick="deleteLibraryExercise('${e.key}')">Delete</button></div></div>`).join("")}function openNewExercise(){showModal(`<h2>Add Exercise</h2><div class="stack"><input id="nxName" placeholder="Name"><input id="nxCat" placeholder="Category"><input id="nxMuscle" placeholder="Muscle"><input id="nxSets" type="number" value="3"><input id="nxMin" type="number" value="8"><input id="nxMax" type="number" value="12"><input id="nxWeight" type="number" value="0"><button onclick="saveNewExercise()">Save Exercise</button><button class="ghost" onclick="closeModal()">Cancel</button></div>`)}function saveNewExercise(){let e={name:nxName.value,key:"custom_"+Date.now(),category:nxCat.value||"Custom",muscle:nxMuscle.value||"General",type:"custom",pattern:"Custom",targetSets:+nxSets.value||3,repMin:+nxMin.value||8,repMax:+nxMax.value||12,weight:+nxWeight.value||0,inc:2.5,rest:90};state.exerciseLibrary.push(e);save();closeModal();renderExercises()}function editLibraryExercise(k){let e=state.exerciseLibrary.find(x=>x.key===k);showModal(`<h2>Edit Exercise</h2><div class="stack"><input id="exName" value="${e.name}"><input id="exCat" value="${e.category}"><input id="exMuscle" value="${e.muscle}"><input id="exSets" type="number" value="${e.targetSets}"><input id="exMin" type="number" value="${e.repMin}"><input id="exMax" type="number" value="${e.repMax}"><input id="exWeight" type="number" value="${e.weight}"><button onclick="saveEditedExercise('${k}')">Save</button><button class="ghost" onclick="closeModal()">Cancel</button></div>`)}function saveEditedExercise(k){let e=state.exerciseLibrary.find(x=>x.key===k);Object.assign(e,{name:exName.value,category:exCat.value,muscle:exMuscle.value,targetSets:+exSets.value,repMin:+exMin.value,repMax:+exMax.value,weight:+exWeight.value});save();closeModal();renderExercises()}function deleteLibraryExercise(k){if(confirm("Delete from depository?")){state.exerciseLibrary=state.exerciseLibrary.filter(e=>e.key!==k);save();renderExercises()}}function toggleFav(k){let e=state.exerciseLibrary.find(x=>x.key===k);e.fav=!e.fav;save();renderExerciseList()}
function renderMobility(){let a=align();mobility.innerHTML=`<div class="card"><h2>Mobility & Alignment</h2><div class="metric"><span>Alignment Score</span><b>${a.score}/100</b></div>${a.items.map((i,idx)=>`<div class="listitem"><span>${i}</span><b>${a.done[idx]}</b></div>`).join("")}<div class="listitem"><span>Run</span><b>${a.run}</b></div></div><div class="card"><h2>Log Mobility</h2><div class="stack">${["Face Pulls","Thoracic Mobility","Hip Mobility","Post-Workout Stretching"].map(x=>`<button class="secondary" onclick="logAlignment('${x}')">Log ${x}</button>`).join("")}</div></div>`}function renderProfile(){profile.innerHTML=`<div class="card"><h2>Profile</h2><div class="stack"><label>Bench 1RM<input id="pBench" type="number" value="${state.oneRM.bench}"></label><label>Squat 1RM<input id="pSquat" type="number" value="${state.oneRM.squat}"></label><label>OHP 1RM<input id="pOhp" type="number" value="${state.oneRM.ohp}"></label><label>Row 1RM<input id="pRow" type="number" value="${state.oneRM.row}"></label><label>Bodyweight<input id="pBody" type="number" value="${state.profile.bodyweight||""}"></label><button onclick="saveProfile()">Save Profile</button></div></div><div class="card"><h2>Backup / Restore</h2><button class="secondary" onclick="copyBackup()">Export Backup</button><textarea id="importBox" placeholder="Paste backup here"></textarea><button class="secondary" onclick="restoreBackup()">Restore Backup</button><button class="danger" onclick="resetData()">Reset App Data</button></div>`}function saveProfile(){state.oneRM={bench:+pBench.value,squat:+pSquat.value,ohp:+pOhp.value,row:+pRow.value};state.profile.bodyweight=+pBody.value||null;if(pBody.value)state.weights.push({date:new Date().toISOString(),kg:+pBody.value});save();alert("Profile saved.")}
function renderMore(){more.innerHTML=`<div class="card"><h2>More</h2><div class="stack"><button class="secondary" onclick="nav('calendar')">Calendar</button><button class="secondary" onclick="nav('exercises')">Exercise Depository</button><button class="secondary" onclick="nav('mobility')">Mobility</button><button class="secondary" onclick="nav('profile')">Profile & Backup</button></div></div><div class="card"><h2>Recovery</h2><div class="stack"><input id="sleep" type="number" value="7"><input id="energy" type="number" value="7"><input id="soreness" type="number" value="3"><input id="stress" type="number" value="4"><button onclick="saveRecovery()">Save Recovery</button></div></div><div class="card"><h2>Run Log</h2><input id="runDist" type="number" step="0.1" placeholder="Distance km"><input id="runTime" placeholder="Time"><input id="runRpe" type="number" placeholder="RPE"><button onclick="saveRun()">Save Run</button></div>`}function saveRecovery(){state.recovery.push({date:new Date().toISOString(),sleep:+sleep.value,energy:+energy.value,soreness:+soreness.value,stress:+stress.value});save();alert("Saved.")}function saveRun(){if(!runDist.value)return;state.runs.push({date:new Date().toISOString(),distance:+runDist.value,time:runTime.value,rpe:+runRpe.value});save();alert("Run saved.")}function logAlignment(t){state.alignment.push({date:new Date().toISOString(),type:t});save();alert(t+" logged.")}function copyBackup(){let txt=JSON.stringify(state,null,2);navigator.clipboard&&navigator.clipboard.writeText(txt);prompt("Copy backup:",txt)}function restoreBackup(){try{state=migrate(JSON.parse(importBox.value));save();location.reload()}catch(e){alert("Invalid backup.")}}function resetData(){if(confirm("Reset app data?")){localStorage.removeItem(STORE);location.reload()}}
let timer=null,timerRemaining=0;function startTimer(sec,label="Rest"){clearInterval(timer);timerRemaining=sec;renderTimer(label);timer=setInterval(()=>{timerRemaining--;renderTimer(label);if(timerRemaining<=0){clearInterval(timer);timer=null;try{navigator.vibrate&&navigator.vibrate([250,120,250])}catch(e){}}},1000)}function stopTimer(){clearInterval(timer);timerDock.classList.add("hide")}function renderTimer(label){timerDock.classList.remove("hide");let m=Math.floor(timerRemaining/60),s=String(timerRemaining%60).padStart(2,"0");timerDock.innerHTML=`<div class="row"><div><div class="mini">${label}</div><div class="timerTime">${m}:${s}</div></div><button class="ghost small" onclick="stopTimer()">Stop</button></div>`}
try{renderDashboard()}catch(e){dashboard.innerHTML=`<div class="card"><h2>Loading issue</h2><pre class="mini">${String(e.stack||e.message||e)}</pre><button onclick="resetData()">Reset App Data</button></div>`}if("serviceWorker"in navigator)navigator.serviceWorker.register("./service-worker.js").catch(()=>{});
</script></body></html>
