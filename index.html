<!DOCTYPE html>
<html lang="en">
<head>

<style>
:root{--bg:#050706;--text:#f4f1eb;--muted:#a6ada8;--green:#39d353;--line:#26342c;--amber:#f2b84b;--red:#e55353;--blue:#4aa3ff;--input:#070b09}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#0e1711 0,#050706 48%,#020303 100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;min-height:100vh}
.app{max-width:980px;margin:auto;padding:16px 14px 92px}.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.logo{text-align:center;letter-spacing:.18em}.ss{font-size:34px;line-height:.85;font-weight:900;background:linear-gradient(#fff,#9b9b96);-webkit-background-clip:text;color:transparent;letter-spacing:-.08em}.brand{font-size:10px;font-weight:800}.brand span{color:var(--green)}
.iconbtn,.pill{border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--muted);border-radius:999px;padding:9px 12px;font-size:12px}
.hero,.card{background:linear-gradient(145deg,rgba(18,25,21,.94),rgba(8,11,9,.96));border:1px solid var(--line);border-radius:22px;padding:15px;margin:12px 0;box-shadow:0 16px 34px rgba(0,0,0,.28)}
h1{font-size:26px;margin:0 0 6px}h2{font-size:18px;margin:0 0 10px}h3{font-size:15px;margin:14px 0 8px}p{color:var(--muted);line-height:1.38;margin:6px 0}.mini{font-size:12px;color:var(--muted)}.ok{color:var(--green)}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.metric{background:rgba(255,255,255,.045);border:1px solid var(--line);border-radius:16px;padding:12px}.metric span{font-size:12px;color:var(--muted)}.metric b{display:block;font-size:22px;margin-top:4px}
button{border:0;border-radius:14px;background:linear-gradient(180deg,#158d43,#0d6c34);color:white;font:inherit;font-weight:800;padding:12px 14px}button.secondary{background:#1b231f;border:1px solid var(--line);color:#e9e4d8}button.ghost{background:transparent;border:1px solid var(--line);color:var(--muted)}button.danger{background:var(--red)}button.small{font-size:12px;padding:8px 10px;border-radius:10px}
input,select,textarea{width:100%;background:var(--input);border:1px solid var(--line);border-radius:13px;color:var(--text);padding:11px;font-size:16px}textarea{min-height:76px}.row{display:flex;gap:8px;align-items:center;justify-content:space-between}.stack{display:flex;flex-direction:column;gap:9px}.hide{display:none!important}
.tabs{position:fixed;left:0;right:0;bottom:0;background:rgba(5,7,6,.95);backdrop-filter:blur(14px);border-top:1px solid var(--line);z-index:10}.tabbar{max-width:980px;margin:auto;display:grid;grid-template-columns:repeat(5,1fr);gap:2px;padding:8px}.tab{background:transparent;color:var(--muted);font-size:11px;padding:8px 2px;border-radius:13px}.tab.active{background:#111a14;color:var(--green)}
.exercise,.library-card,.historyItem{border:1px solid var(--line);background:rgba(255,255,255,.035);border-radius:17px;padding:12px;margin:10px 0}.exercise-title{display:flex;justify-content:space-between;gap:8px}.badge{font-size:11px;background:rgba(57,211,83,.14);border:1px solid rgba(57,211,83,.28);padding:5px 8px;border-radius:999px;color:#d9ffe0;white-space:nowrap}
.setgrid{display:grid;grid-template-columns:35px 1fr 1fr 1fr;gap:6px;align-items:center;margin-top:9px}.setgrid label{font-size:11px;color:var(--muted);text-align:center}.setnum{font-size:12px;color:var(--muted)}
.listitem{display:flex;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}.listitem:last-child{border-bottom:0}.rec{border:1px solid var(--line);border-left:4px solid var(--green);background:rgba(57,211,83,.07);border-radius:14px;padding:10px;margin-top:8px}.rec.hold{border-left-color:var(--amber);background:rgba(242,184,75,.08)}.rec.reduce{border-left-color:var(--red);background:rgba(229,83,83,.08)}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}.calHead{text-align:center;font-size:11px;color:var(--muted);padding:4px}.calDay{min-height:58px;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.03);padding:6px;font-size:12px}.calDay.today{outline:2px solid var(--green)}.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:3px}.dot.workout{background:var(--green)}.dot.run{background:var(--blue)}.dot.mobility{background:var(--amber)}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:30;display:flex;align-items:flex-end}.modalCard{background:#0b100d;border:1px solid var(--line);border-radius:22px 22px 0 0;padding:16px;width:100%;max-height:88vh;overflow:auto}.timerDock{position:fixed;left:12px;right:12px;bottom:78px;z-index:25;background:#0d1110;border:1px solid var(--green);border-radius:18px;padding:12px}.timerTime{font-size:28px;font-weight:900}
@media(min-width:760px){.grid{grid-template-columns:repeat(4,1fr)}.tab{font-size:12px}.modal{align-items:center;justify-content:center}.modalCard{max-width:680px;border-radius:22px}}
</style>
</head>
<body>
<div id="app" class="app">
<header class="topbar"><button class="iconbtn" onclick="nav('settings')">☰</button><div class="logo"><div class="ss">SS</div><div class="brand">SEEBO <span>STRENGTH</span></div></div><div class="pill">v2.0.2</div></header>
<section id="dashboard" class="screen"></section><section id="workout" class="screen hide"></section><section id="history" class="screen hide"></section><section id="calendar" class="screen hide"></section><section id="more" class="screen hide"></section><section id="settings" class="screen hide"></section>
</div>
<nav class="tabs"><div class="tabbar"><button class="tab active" onclick="nav('dashboard')">Dashboard</button><button class="tab" onclick="nav('workout')">Workout</button><button class="tab" onclick="nav('history')">History</button><button class="tab" onclick="nav('calendar')">Calendar</button><button class="tab" onclick="nav('more')">More</button></div></nav>
<div id="modal" class="modal hide"></div><div id="timerDock" class="timerDock hide"></div>
<script>
const BASE_PROGRAM={"Push A":[["Barbell Bench Press","bench","Chest","barbell","Horizontal Push",4,6,10,72.5,2.5,180],["Standing Barbell Shoulder Press","ohp","Shoulders","barbell","Vertical Push",3,6,10,32.5,2.5,150],["Weighted / Bodyweight Dips","dips","Chest/Triceps","bodyweight","Push",3,8,12,0,2.5,120],["Incline Dumbbell Press","incline_db","Chest","dumbbell","Incline Push",3,8,12,28,2,120],["Cable Triceps Pressdown","pressdown","Triceps","cable","Elbow Extension",3,10,15,20,2.5,75],["Face Pull","facepull_a","Rear Delts","cable","Posture",3,15,20,15,2.5,60]],"Pull A":[["Barbell Bent Over Row","row","Back","barbell","Horizontal Pull",4,6,10,60,2.5,150],["Pull Ups","pullups","Back/Biceps","bodyweight","Vertical Pull",3,6,10,0,2.5,150],["Lat Pulldown","pulldown_a","Lats","cable","Vertical Pull",3,8,12,45,2.5,90],["Seated Cable Row","cablerow_a","Mid Back","cable","Horizontal Pull",3,8,12,45,2.5,90],["Dumbbell Hammer Curl","hammer","Biceps","dumbbell","Curl",3,10,15,18,2,60],["Reverse Fly","reversefly","Rear Delts","dumbbell","Posture",3,12,20,8,1,60]],"Legs":[["Back Squat","squat","Legs","barbell","Squat",4,6,10,87.5,2.5,180],["Romanian Deadlift","rdl","Posterior Chain","barbell","Hinge",3,8,12,70,2.5,150],["Bulgarian Split Squat","bss","Quads/Glutes","dumbbell","Single Leg",3,8,12,22,2,120],["Standing Calf Raise","calf","Calves","dumbbell","Calf",4,12,20,40,2.5,60],["Hanging Leg Raise","hangingleg","Core","bodyweight","Core",3,10,15,0,1,60],["Pallof Press","pallof","Core","cable","Anti-Rotation",3,10,15,10,2.5,60]],"Push B":[["Incline Barbell Bench Press","incline_bar","Upper Chest","barbell","Incline Push",3,8,12,67.5,2.5,120],["Seated Dumbbell Shoulder Press","db_press","Shoulders","dumbbell","Vertical Push",3,8,12,22,2,120],["Dumbbell Lateral Raise","lateral","Side Delts","dumbbell","Isolation",3,12,20,12,1,60],["Cable Fly","cablefly","Chest","cable","Fly",3,12,15,15,2.5,75],["Overhead Triceps Extension","ohtri","Triceps","cable","Elbow Extension",3,10,15,15,2.5,75]],"Pull B":[["Chest Supported Dumbbell Row","csrow","Back","dumbbell","Horizontal Pull",3,8,12,32,2,90],["Wide Grip Lat Pulldown","pulldown_b","Lats","cable","Vertical Pull",3,10,15,42.5,2.5,90],["Seated Cable Row","cablerow_b","Mid Back","cable","Horizontal Pull",3,10,15,42.5,2.5,90],["Incline Dumbbell Curl","inclinecurl","Biceps","dumbbell","Curl",3,10,15,14,1,60],["Face Pull","facepull_b","Rear Delts","cable","Posture",3,15,20,12.5,2.5,60],["Farmer Carries","farmers","Grip/Core/Posture","dumbbell","Carry",3,30,50,40,2,90]]};
const STRETCHES={"Push A":[["Doorway Pec Stretch",45],["Thoracic Extension Over Bench",60],["Cross-body Shoulder Stretch",45],["Triceps Overhead Stretch",45]],"Push B":[["Doorway Pec Stretch",45],["Thoracic Extension Over Bench",60],["Pec Minor Wall Stretch",45],["Lat Prayer Stretch on Bench",45]],"Pull A":[["Lat Stretch",45],["Child's Pose with Side Reach",45],["Biceps Wall Stretch",45],["Thoracic Open Books",45]],"Pull B":[["Lat Stretch",45],["Biceps Wall Stretch",45],["Thoracic Open Books",45],["Neck / Upper Trap Stretch",30]],"Legs":[["Hip Flexor Couch Stretch",60],["Hamstring Stretch",45],["Pigeon Stretch",45],["Calf Stretch",45]]};
const STORE_KEY="seebo_strength_v202";const LEGACY_KEYS=["seebo_strength_v2","seebo_strength_v15","sam_performance_coach_v5"];
function obj(r){return{name:r[0],key:r[1],category:r[2],muscle:r[2],type:r[3],pattern:r[4],targetSets:r[5],repMin:r[6],repMax:r[7],weight:r[8],inc:r[9],rest:r[10]}}
function baseProgram(){let p={};Object.keys(BASE_PROGRAM).forEach(k=>p[k]=BASE_PROGRAM[k].map(obj));return p}
function uid(p="id"){return p+"_"+Date.now()+"_"+Math.random().toString(36).slice(2,8)}function clone(o){return JSON.parse(JSON.stringify(o||{}))}function todayKey(d=new Date()){return d.toISOString().slice(0,10)}function kg(x){return(Number(x)||0).toFixed((Number(x)||0)%1?1:0)+"kg"}function round2_5(x){return Math.round(x/2.5)*2.5}
function normaliseEx(e){e=e||{};let tr=+e.targetReps||+e.repMin||8,rm=+e.repMin||tr,rx=+e.repMax||Math.max(rm,tr+4);return{name:e.name||"Exercise",key:e.key||uid("custom"),category:e.category||e.muscle||"General",muscle:e.muscle||e.category||"General",type:e.type||"custom",pattern:e.pattern||e.type||"Custom",targetSets:+e.targetSets||3,repMin:rm,repMax:rx,weight:+e.weight||0,inc:+e.inc||2.5,rest:+e.rest||90}}
function normaliseProgram(p){p=p||baseProgram();let out={};Object.keys(p).forEach(k=>out[k]=(p[k]||[]).map(normaliseEx));return out}
function libraryFrom(p){let seen={},a=[];Object.values(p).flat().forEach(e=>{if(!seen[e.key]){seen[e.key]=1;a.push(clone(e))}});return a}
function def(){let p=baseProgram();return{version:"2.0.2",week:1,dayOverrides:{},customProgram:p,exerciseLibrary:libraryFrom(p),workoutSessions:[],runs:[],recovery:[],weights:[],alignment:[],targets:{},oneRM:{bench:105,squat:130,ohp:50,row:90},settings:{}}}
function normWorkout(w){return{id:w.id||uid("workout"),date:w.date||new Date().toISOString(),name:w.name||"Workout",notes:w.notes||"",readiness:w.readiness||null,volume:+w.volume||0,exercises:(w.exercises||[]).map(e=>({...normaliseEx(e),id:e.id||uid("ex"),sets:(e.sets||[]).map((s,i)=>({id:s.id||uid("set"),set:i+1,weight:+s.weight||0,reps:+s.reps||0,rpe:+s.rpe||0})),progression:e.progression||null,volume:+e.volume||0}))}}
function migrate(s){let d=def();s={...d,...(s||{})};s.version="2.0.2";s.customProgram=normaliseProgram(s.customProgram);s.exerciseLibrary=(s.exerciseLibrary&&s.exerciseLibrary.length?s.exerciseLibrary:libraryFrom(s.customProgram)).map(normaliseEx);if(!s.workoutSessions&&s.workouts)s.workoutSessions=s.workouts.map(normWorkout);s.workoutSessions=(s.workoutSessions||[]).map(normWorkout);s.runs=s.runs||[];s.recovery=s.recovery||[];s.weights=s.weights||[];s.alignment=s.alignment||[];s.dayOverrides=s.dayOverrides||{};s.oneRM={bench:+(s.oneRM&&s.oneRM.bench||105),squat:+(s.oneRM&&s.oneRM.squat||130),ohp:+(s.oneRM&&s.oneRM.ohp||50),row:+(s.oneRM&&s.oneRM.row||90)};initTargets(s);localStorage.setItem(STORE_KEY,JSON.stringify(s));return s}
function load(){try{let s=JSON.parse(localStorage.getItem(STORE_KEY)||"null");if(s)return migrate(s);for(let k of LEGACY_KEYS){let o=JSON.parse(localStorage.getItem(k)||"null");if(o)return migrate(o)}}catch(e){console.error(e)}return migrate(def())}
let state=load();function initTargets(s=state){s.targets=s.targets||{};Object.values(s.customProgram).flat().concat(s.exerciseLibrary).forEach(e=>{if(!s.targets[e.key])s.targets[e.key]={};s.targets[e.key].weight=+(s.targets[e.key].weight ?? e.weight ?? 0);s.targets[e.key].currentRepTarget=+(s.targets[e.key].currentRepTarget ?? e.repMin ?? e.targetReps ?? 8);s.targets[e.key].lastReason=s.targets[e.key].lastReason||"Initial programme weight.";s.targets[e.key].lastAction=s.targets[e.key].lastAction||"hold"})}function save(){initTargets();localStorage.setItem(STORE_KEY,JSON.stringify(state))}
function avg(a){return a.length?a.reduce((x,y)=>x+y,0)/a.length:0}function epley(w,r){return w*(1+r/30)}function scheduledWorkoutName(d=new Date()){return{1:"Push A",2:"Pull A",3:"Run",4:"Legs",5:"Push B",6:"Pull B",0:"Rest"}[d.getDay()]}function todayWorkoutName(){return state.dayOverrides[todayKey()]||scheduledWorkoutName()}function readiness(){let r=state.recovery.at(-1);return r?Math.round((+r.sleep + +r.energy + (11-+r.soreness) + (11-+r.stress))/4):null}function weeklyVolume(){let since=Date.now()-7*864e5;return Math.round(state.workoutSessions.filter(w=>new Date(w.date)>since).reduce((s,w)=>s+w.volume,0))}function alignmentScore(){let since=Date.now()-7*864e5,items=["Face Pulls","Thoracic Mobility","Hip Mobility","Post-Workout Stretching"],done=items.map(i=>state.alignment.filter(a=>a.type===i&&new Date(a.date)>since).length),run=state.runs.filter(r=>new Date(r.date)>since).length,score=Math.min(100,Math.round(((Math.min(done[0],2)/2)+(Math.min(done[1],2)/2)+(Math.min(done[2],2)/2)+(Math.min(done[3],3)/3)+(Math.min(run,1)))/5*100));return{score,items,done,run}}
function progressionDecision(ex,sets){let valid=sets.filter(s=>+s.reps>0),repMin=+ex.repMin||6,repMax=+ex.repMax||12,inc=+ex.inc||2.5,weights=valid.map(s=>+s.weight||0),reps=valid.map(s=>+s.reps||0),rpes=valid.map(s=>+s.rpe||0).filter(Boolean),weight=weights.length?Math.max(...weights):(+ex.weight||0),avgRpe=avg(rpes),minRep=reps.length?Math.min(...reps):0,target=state.targets[ex.key]||{currentRepTarget:repMin,weight},cur=target.currentRepTarget||repMin,allTop=valid.length>=ex.targetSets&&reps.every(r=>r>=repMax),allCur=valid.length>=ex.targetSets&&reps.every(r=>r>=cur),nextWeight=weight,nextRepTarget=cur,action="hold",reason="Repeat the same target next time.";if(allTop&&(avgRpe===0||avgRpe<=8.75)){action="increase";nextWeight=round2_5(weight+inc);nextRepTarget=repMin;reason=`Top of range hit (${repMax}). Increase weight and reset reps to ${repMin}.`}else if(allCur&&cur<repMax&&(avgRpe===0||avgRpe<=9)){action="reps";nextRepTarget=cur+1;reason=`Progress reps first. Keep ${kg(weight)} and target ${nextRepTarget} reps.`}else if(allCur&&avgRpe>9){action="hold";reason=`Target completed, but RPE averaged ${avgRpe.toFixed(1)}. Hold.`}else if(minRep&&minRep<repMin-1&&avgRpe>=9){action="reduce";nextWeight=Math.max(0,round2_5(weight*.95));nextRepTarget=repMin;reason="Reps dropped below range with high effort. Reduce slightly."}else if(minRep&&minRep<cur){action="hold";reason=`Not all sets hit ${cur}. Repeat until consistent.`}return{action,nextWeight,nextRepTarget,reason,avgRpe,repMin,repMax}}
function recClass(a){return a==="reduce"?"rec reduce":a==="hold"?"rec hold":"rec"}function recalc(){state.oneRM={bench:105,squat:130,ohp:50,row:90};initTargets();state.workoutSessions.sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach(w=>{w.volume=0;w.exercises.forEach(ex=>{let vol=0,best=0;ex.sets.forEach(s=>{vol+=s.weight*s.reps;if(s.weight&&s.reps)best=Math.max(best,epley(s.weight,s.reps))});ex.volume=vol;w.volume+=vol;let dec=progressionDecision(ex,ex.sets);ex.progression=dec;state.targets[ex.key]={...(state.targets[ex.key]||{}),weight:dec.nextWeight,currentRepTarget:dec.nextRepTarget,lastAction:dec.action,lastReason:dec.reason};if(["bench","squat","ohp","row"].includes(ex.key)&&best>state.oneRM[ex.key])state.oneRM[ex.key]=round2_5(best)})});save()}
function nav(id){["dashboard","workout","history","calendar","more","settings"].forEach(s=>document.getElementById(s).classList.toggle("hide",s!==id));document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("active",b.textContent.toLowerCase()===id));if(id==="dashboard")renderDashboard();if(id==="workout")renderWorkout();if(id==="history")renderHistory();if(id==="calendar")renderCalendar();if(id==="more")renderMore();if(id==="settings")renderSettings();window.scrollTo(0,0)}
function renderDashboard(){let h=new Date().getHours(),r=readiness(),al=alignmentScore(),tw=todayWorkoutName(),plan="";if(state.customProgram[tw])state.customProgram[tw].forEach(ex=>{let t=state.targets[ex.key]||{};plan+=`<div class="listitem"><div><b>${ex.name}</b><br><span class="mini">${ex.repMin}-${ex.repMax} reps • ${ex.muscle}</span></div><div class="badge">${kg(t.weight)} × ${t.currentRepTarget||ex.repMin}</div></div>`});else plan=tw==="Run"?"<p>Run 4-5km easy. Log pace, RPE and notes afterwards.</p>":"<p>Rest day. Optional mobility only.</p>";document.getElementById("dashboard").innerHTML=`<div class="hero"><h1>${h<12?"Good morning":"Good evening"}, Seebo 👊</h1><p>Performance Coaching System</p><p class="mini ok">Version 2.0.2 stable loaded.</p><div class="grid" style="margin-top:14px"><div class="metric"><span>Today</span><b>${tw}</b></div><div class="metric"><span>Readiness</span><b>${r?r+"/10":"—"}</b></div><div class="metric"><span>Alignment</span><b>${al.score}/100</b></div><div class="metric"><span>Weekly Volume</span><b>${weeklyVolume().toLocaleString()}kg</b></div></div></div><div class="card"><div class="row"><h2>Today's Plan</h2><button onclick="nav('workout')">Start</button></div><label class="mini">Switch today's workout</label><select onchange="state.dayOverrides[todayKey()]=this.value;save();renderDashboard()">${["Push A","Pull A","Run","Legs","Push B","Pull B","Rest"].map(x=>`<option ${x===tw?"selected":""}>${x}</option>`).join("")}</select><div style="margin-top:12px">${plan}</div></div><div class="card"><h2>Coach Notes</h2><div class="rec">${r?r>=8?"Green light. Train normally.":r>=6?"Amber. Keep form strict and avoid grinding.":"Low readiness. Reduce intensity or remove one set.":"Complete a recovery check-in."}</div></div><div class="card"><h2>Estimated 1RM</h2><div class="grid"><div class="metric"><span>Bench</span><b>${kg(state.oneRM.bench)}</b></div><div class="metric"><span>Squat</span><b>${kg(state.oneRM.squat)}</b></div><div class="metric"><span>OHP</span><b>${kg(state.oneRM.ohp)}</b></div><div class="metric"><span>Row</span><b>${kg(state.oneRM.row)}</b></div></div></div>`}
function renderWorkout(){let names=Object.keys(state.customProgram),tw=todayWorkoutName();document.getElementById("workout").innerHTML=`<div class="card"><h2>Workout Logger</h2><select id="workoutSelect" onchange="renderWorkoutList()">${names.map(n=>`<option ${n===(state.customProgram[tw]?tw:names[0])?"selected":""}>${n}</option>`).join("")}</select></div><div id="workoutList"></div><div id="stretchPanel"></div><div class="card"><h2>Finish Session</h2><textarea id="sessionNotes" placeholder="Notes, niggles, energy, form..."></textarea><button style="width:100%;margin-top:10px" onclick="saveWorkout()">Complete Workout</button></div>`;renderWorkoutList()}
function renderWorkoutList(){let name=document.getElementById("workoutSelect").value,list=document.getElementById("workoutList");list.innerHTML="";state.customProgram[name].forEach(ex=>{let t=state.targets[ex.key]||{weight:ex.weight,currentRepTarget:ex.repMin},note=t.lastReason?`<div class="${recClass(t.lastAction)}"><b>Next: ${kg(t.weight)} × ${t.currentRepTarget||ex.repMin}</b><div class="mini">${t.lastReason}</div></div>`:"";let s=`<div class="exercise"><div class="exercise-title"><div><b>${ex.name}</b><br><span class="mini">${ex.repMin}-${ex.repMax} reps • ${ex.pattern}</span></div><div class="badge">${kg(t.weight)} × ${t.currentRepTarget||ex.repMin}</div></div><div class="setgrid"><label>Set</label><label>KG</label><label>Reps</label><label>RPE</label>`;for(let i=1;i<=ex.targetSets;i++)s+=`<div class="setnum">${i}</div><input id="${ex.key}_w_${i}" type="number" step="0.5" value="${t.weight}"><input id="${ex.key}_r_${i}" type="number" value="${t.currentRepTarget||ex.repMin}"><input id="${ex.key}_rpe_${i}" type="number" min="1" max="10" placeholder="8">`;s+=`</div><div class="row" style="margin-top:10px"><button class="ghost small" onclick="adjust('${ex.key}',-2.5)">-2.5</button><button class="ghost small" onclick="repeatPrev('${ex.key}')">Previous</button><button class="ghost small" onclick="adjust('${ex.key}',2.5)">+2.5</button><button class="secondary small" onclick="startTimer(${ex.rest||90},'Rest')">Timer</button></div>${note}</div>`;list.innerHTML+=s});renderStretches(name)}
function adjust(k,d){document.querySelectorAll(`[id^="${k}_w_"]`).forEach(i=>i.value=(+i.value+d).toFixed(1).replace(".0",""))}function previousExercise(k){for(let i=state.workoutSessions.length-1;i>=0;i--){let e=state.workoutSessions[i].exercises.find(x=>x.key===k);if(e)return e}return null}function repeatPrev(k){let p=previousExercise(k);if(!p)return alert("No previous data.");p.sets.forEach((s,i)=>{let n=i+1;if(document.getElementById(`${k}_w_${n}`)){document.getElementById(`${k}_w_${n}`).value=s.weight;document.getElementById(`${k}_r_${n}`).value=s.reps;document.getElementById(`${k}_rpe_${n}`).value=s.rpe||""}})}
function renderStretches(name){let arr=STRETCHES[name]||[];document.getElementById("stretchPanel").innerHTML=`<div class="card"><h2>Post-Workout Stretches</h2>${arr.map(s=>`<div class="listitem"><div><b>${s[0]}</b><br><span class="mini">${s[1]} seconds</span></div><button class="secondary small" onclick="startTimer(${s[1]},'${s[0]}')">Timer</button></div>`).join("")}</div>`}
function saveWorkout(){let name=document.getElementById("workoutSelect").value,exercises=[],volume=0;state.customProgram[name].forEach(ex=>{let sets=[],vol=0,best=0;for(let i=1;i<=ex.targetSets;i++){let weight=+document.getElementById(`${ex.key}_w_${i}`).value||0,reps=+document.getElementById(`${ex.key}_r_${i}`).value||0,rpe=+document.getElementById(`${ex.key}_rpe_${i}`).value||0;sets.push({id:uid("set"),set:i,weight,reps,rpe});vol+=weight*reps;if(weight&&reps)best=Math.max(best,epley(weight,reps))}let dec=progressionDecision(ex,sets);state.targets[ex.key]={...(state.targets[ex.key]||{}),weight:dec.nextWeight,currentRepTarget:dec.nextRepTarget,lastAction:dec.action,lastReason:dec.reason};if(["bench","squat","ohp","row"].includes(ex.key)&&best>state.oneRM[ex.key])state.oneRM[ex.key]=round2_5(best);exercises.push({...clone(ex),id:uid("ex"),sets,volume:vol,progression:dec});volume+=vol});state.workoutSessions.push({id:uid("workout"),date:new Date().toISOString(),name,notes:document.getElementById("sessionNotes").value,readiness:readiness(),volume,exercises});save();renderDashboard();alert("Workout saved.")}
function renderHistory(){let html=`<div class="card"><h2>Workout History</h2><p>Tap any workout to view or edit it.</p></div>`;state.workoutSessions.slice().reverse().forEach(w=>html+=`<div class="historyItem" onclick="openWorkout('${w.id}')"><div class="row"><div><b>${w.name}</b><br><span class="mini">${new Date(w.date).toLocaleDateString("en-GB")} • Readiness ${w.readiness||"—"}/10</span></div><b>${Math.round(w.volume).toLocaleString()}kg</b></div></div>`);document.getElementById("history").innerHTML=html}
function showModal(html){document.getElementById("modal").innerHTML=`<div class="modalCard">${html}</div>`;document.getElementById("modal").classList.remove("hide")}function closeModal(){document.getElementById("modal").classList.add("hide");document.getElementById("modal").innerHTML=""}
function openWorkout(id){let w=state.workoutSessions.find(x=>x.id===id);if(!w)return;showModal(`<div class="row"><h2>${w.name}</h2><button class="ghost small" onclick="closeModal()">Close</button></div><p class="mini">${new Date(w.date).toLocaleString("en-GB")} • ${Math.round(w.volume).toLocaleString()}kg</p><textarea id="editNotes">${w.notes||""}</textarea>${w.exercises.map((ex,ei)=>`<div class="exercise"><b>${ex.name}</b><div class="setgrid"><label>Set</label><label>KG</label><label>Reps</label><label>RPE</label>${ex.sets.map((s,si)=>`<div class="setnum">${si+1}</div><input id="e_${ei}_${si}_w" type="number" value="${s.weight}"><input id="e_${ei}_${si}_r" type="number" value="${s.reps}"><input id="e_${ei}_${si}_rpe" type="number" value="${s.rpe||""}">`).join("")}</div></div>`).join("")}<div class="edit-actions"><button onclick="saveEdits('${id}')">Save Edits</button><button class="danger" onclick="deleteWorkout('${id}')">Delete</button></div>`)}
function saveEdits(id){let w=state.workoutSessions.find(x=>x.id===id);w.notes=document.getElementById("editNotes").value;w.exercises.forEach((ex,ei)=>ex.sets.forEach((s,si)=>{s.weight=+document.getElementById(`e_${ei}_${si}_w`).value||0;s.reps=+document.getElementById(`e_${ei}_${si}_r`).value||0;s.rpe=+document.getElementById(`e_${ei}_${si}_rpe`).value||0}));recalc();closeModal();renderHistory();alert("Workout updated.")}function deleteWorkout(id){if(confirm("Delete workout?")){state.workoutSessions=state.workoutSessions.filter(w=>w.id!==id);recalc();closeModal();renderHistory()}}
function renderCalendar(){let now=new Date(),y=now.getFullYear(),m=now.getMonth(),first=new Date(y,m,1),days=new Date(y,m+1,0).getDate(),start=(first.getDay()+6)%7,cells=["M","T","W","T","F","S","S"].map(d=>`<div class="calHead">${d}</div>`).join("");for(let i=0;i<start;i++)cells+="<div></div>";for(let d=1;d<=days;d++){let key=new Date(y,m,d+1).toISOString().slice(0,10),ws=state.workoutSessions.filter(w=>w.date.slice(0,10)===key),rs=state.runs.filter(r=>r.date.slice(0,10)===key),ms=state.alignment.filter(a=>a.date.slice(0,10)===key);cells+=`<div class="calDay ${key===todayKey()?"today":""}" onclick="openDay('${key}')"><b>${d}</b><br>${ws.length?'<span class="dot workout"></span>':''}${rs.length?'<span class="dot run"></span>':''}${ms.length?'<span class="dot mobility"></span>':''}</div>`}document.getElementById("calendar").innerHTML=`<div class="card"><h2>${now.toLocaleDateString("en-GB",{month:"long",year:"numeric"})}</h2><div class="calendar">${cells}</div></div>`}
function openDay(key){let ws=state.workoutSessions.filter(w=>w.date.slice(0,10)===key),rs=state.runs.filter(r=>r.date.slice(0,10)===key),rec=state.recovery.filter(r=>r.date.slice(0,10)===key);showModal(`<div class="row"><h2>${new Date(key).toLocaleDateString("en-GB")}</h2><button class="ghost small" onclick="closeModal()">Close</button></div>${rec.map(r=>`<div class="rec hold"><b>Readiness</b><div class="mini">Sleep ${r.sleep}, Energy ${r.energy}, Soreness ${r.soreness}, Stress ${r.stress}</div></div>`).join("")}${ws.map(w=>`<div class="historyItem" onclick="closeModal();openWorkout('${w.id}')"><b>${w.name}</b><br><span class="mini">${Math.round(w.volume).toLocaleString()}kg</span></div>`).join("")}${rs.map(r=>`<div class="historyItem"><b>Run</b><br><span class="mini">${r.distance}km • ${r.time||"—"} • RPE ${r.rpe||"—"}</span></div>`).join("")}`)}
function renderMore(){document.getElementById("more").innerHTML=`<div class="card"><h2>Recovery</h2><div class="stack"><input id="sleep" type="number" value="7" placeholder="Sleep"><input id="energy" type="number" value="7" placeholder="Energy"><input id="soreness" type="number" value="3" placeholder="Soreness"><input id="stress" type="number" value="4" placeholder="Stress"><button onclick="saveRecovery()">Save Recovery</button></div></div><div class="card"><h2>Run Log</h2><div class="stack"><input id="runDist" type="number" step="0.1" placeholder="Distance km"><input id="runTime" placeholder="Time e.g. 24:30"><input id="runRpe" type="number" placeholder="RPE"><button onclick="saveRun()">Save Run</button></div></div><div class="card"><h2>Alignment</h2><div class="stack">${["Face Pulls","Thoracic Mobility","Hip Mobility","Post-Workout Stretching"].map(x=>`<button class="secondary" onclick="logAlignment('${x}')">Log ${x}</button>`).join("")}</div></div><div class="card"><h2>Bodyweight</h2><div class="row"><input id="bodyweight" type="number" step="0.1" placeholder="kg"><button onclick="saveWeight()">Save</button></div></div>`}
function saveRecovery(){state.recovery.push({date:new Date().toISOString(),sleep:+sleep.value,energy:+energy.value,soreness:+soreness.value,stress:+stress.value});save();alert("Saved.")}function saveRun(){if(!runDist.value)return;state.runs.push({date:new Date().toISOString(),distance:+runDist.value,time:runTime.value,rpe:+runRpe.value});save();alert("Run saved.")}function saveWeight(){if(!bodyweight.value)return;state.weights.push({date:new Date().toISOString(),kg:+bodyweight.value});save();alert("Bodyweight saved.")}function logAlignment(type){state.alignment.push({date:new Date().toISOString(),type});save();alert(type+" logged.")}
function renderSettings(){document.getElementById("settings").innerHTML=`<div class="card"><h2>Settings</h2><div class="stack"><label>Bench 1RM<input id="setBench" type="number" value="${state.oneRM.bench}"></label><label>Squat 1RM<input id="setSquat" type="number" value="${state.oneRM.squat}"></label><label>OHP 1RM<input id="setOhp" type="number" value="${state.oneRM.ohp}"></label><label>Row 1RM<input id="setRow" type="number" value="${state.oneRM.row}"></label><button onclick="saveSettings()">Save Settings</button></div></div><div class="card"><h2>Backup / Restore</h2><button class="secondary" onclick="copyBackup()">Export Backup</button><textarea id="importBox" placeholder="Paste backup here"></textarea><button class="secondary" onclick="restoreBackup()">Restore Backup</button><button class="danger" onclick="resetData()">Reset App Data</button></div>`}function saveSettings(){state.oneRM={bench:+setBench.value,squat:+setSquat.value,ohp:+setOhp.value,row:+setRow.value};save();alert("Settings saved.")}function copyBackup(){let txt=JSON.stringify(state,null,2);navigator.clipboard&&navigator.clipboard.writeText(txt);prompt("Copy backup:",txt)}function restoreBackup(){try{state=migrate(JSON.parse(importBox.value));save();location.reload()}catch(e){alert("Invalid backup.")}}function resetData(){if(confirm("Reset v2.0.2 app data?")){localStorage.removeItem(STORE_KEY);location.reload()}}
let timer=null,timerRemaining=0;function startTimer(sec,label="Rest"){clearInterval(timer);timerRemaining=sec;renderTimer(label);timer=setInterval(()=>{timerRemaining--;renderTimer(label);if(timerRemaining<=0){clearInterval(timer);timer=null;try{navigator.vibrate&&navigator.vibrate([250,120,250])}catch(e){}}},1000)}function stopTimer(){clearInterval(timer);timerDock.classList.add("hide")}function renderTimer(label){timerDock.classList.remove("hide");let m=Math.floor(timerRemaining/60),s=String(timerRemaining%60).padStart(2,"0");timerDock.innerHTML=`<div class="row"><div><div class="mini">${label}</div><div class="timerTime">${m}:${s}</div></div><button class="ghost small" onclick="stopTimer()">Stop</button></div>`}
try{renderDashboard()}catch(e){document.getElementById("dashboard").innerHTML=`<div class="card"><h2>Loading issue</h2><p>The app hit an error, but no data has been deleted.</p><pre class="mini" style="white-space:pre-wrap">${String(e.stack||e.message||e)}</pre><button onclick="resetData()">Reset v2.0.2 Data</button></div>`}
if("serviceWorker" in navigator)navigator.serviceWorker.register("./service-worker.js").catch(()=>{});
</script>
</body></html>
