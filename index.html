<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#050706">
<title>Seebo Strength Data Rescue</title>
<style>
body{margin:0;background:#050706;color:#f4f1eb;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;padding:18px;max-width:900px;margin:auto}
.card{background:#0d1110;border:1px solid #26342c;border-radius:20px;padding:16px;margin:14px 0}
h1{margin:0 0 8px;font-size:26px}h2{font-size:18px}.mini,p{color:#a6ada8;line-height:1.4}
button{border:0;border-radius:14px;background:linear-gradient(180deg,#158d43,#0d6c34);color:white;font:inherit;font-weight:800;padding:12px 14px;margin:6px 0;width:100%}
button.secondary{background:#1b231f;border:1px solid #26342c;color:#e9e4d8}
textarea{width:100%;min-height:260px;background:#070b09;border:1px solid #26342c;border-radius:14px;color:#f4f1eb;padding:12px;font-size:12px}
.ok{color:#39d353}.warn{color:#f2b84b}.bad{color:#e55353}
.stat{display:flex;justify-content:space-between;border-bottom:1px solid #26342c;padding:10px 0}
</style>
</head>
<body>
<div class="card">
<h1>SS Seebo Strength</h1>
<p class="ok">Data Rescue / Full Backup Export</p>
<p>This page reads your existing Seebo Strength data from this phone and creates a full backup. It does not delete or overwrite anything.</p>
</div>

<div class="card">
<h2>Detected Data</h2>
<div id="status"></div>
</div>

<div class="card">
<h2>Actions</h2>
<button onclick="copyBackup()">Copy Full Backup</button>
<button onclick="downloadBackup()">Download Backup File</button>
<button class="secondary" onclick="showRaw()">Show Raw Backup Text</button>
<button class="secondary" onclick="location.href='https://saallen90-cmd.github.io/Performance-Coach/?refresh=v15'">Return to App URL</button>
</div>

<div class="card">
<h2>Raw Backup</h2>
<textarea id="raw" placeholder="Tap 'Show Raw Backup Text'"></textarea>
</div>

<script>
const KEYS = ["seebo_strength_v15","seebo_strength_v2","sam_performance_coach_v5"];
let foundKey = null;
let foundData = null;

function safeParse(x){try{return JSON.parse(x)}catch(e){return null}}

function detect(){
  let html = "";
  for(const k of KEYS){
    const raw = localStorage.getItem(k);
    const parsed = raw ? safeParse(raw) : null;
    if(raw && parsed && !foundData){
      foundKey = k;
      foundData = parsed;
    }
    html += `<div class="stat"><span>${k}</span><b class="${raw?'ok':'warn'}">${raw ? 'Found' : 'Not found'}</b></div>`;
  }
  if(foundData){
    const workouts = foundData.workouts || foundData.workoutSessions || [];
    const runs = foundData.runs || [];
    const recovery = foundData.recovery || [];
    const targets = foundData.targets || {};
    html += `<hr style="border:0;border-top:1px solid #26342c;margin:14px 0">`;
    html += `<div class="stat"><span>Using key</span><b>${foundKey}</b></div>`;
    html += `<div class="stat"><span>Version</span><b>${foundData.version || foundData.appVersion || "Unknown"}</b></div>`;
    html += `<div class="stat"><span>Completed workouts</span><b>${workouts.length}</b></div>`;
    html += `<div class="stat"><span>Runs</span><b>${runs.length}</b></div>`;
    html += `<div class="stat"><span>Recovery logs</span><b>${recovery.length}</b></div>`;
    html += `<div class="stat"><span>Targets</span><b>${Object.keys(targets).length}</b></div>`;
  } else {
    html += `<p class="bad">No Seebo Strength data found in local storage on this browser. Make sure you opened this page from the same iPhone/Safari app where you logged your workouts.</p>`;
  }
  document.getElementById("status").innerHTML = html;
}

function backupObject(){
  return {
    exportedAt: new Date().toISOString(),
    rescueVersion: "1.0",
    sourceKey: foundKey,
    data: foundData
  };
}

function backupText(){
  return JSON.stringify(backupObject(), null, 2);
}

async function copyBackup(){
  if(!foundData){alert("No data found.");return;}
  const text = backupText();
  try{
    await navigator.clipboard.writeText(text);
    alert("Full backup copied. Paste it into Notes or send it to yourself.");
  }catch(e){
    document.getElementById("raw").value = text;
    alert("Clipboard blocked. Raw backup text is shown below — select all and copy it.");
  }
}

function downloadBackup(){
  if(!foundData){alert("No data found.");return;}
  const text = backupText();
  const blob = new Blob([text], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const date = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `seebo-strength-backup-${date}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

function showRaw(){
  if(!foundData){alert("No data found.");return;}
  document.getElementById("raw").value = backupText();
}

detect();
</script>
</body>
</html>
